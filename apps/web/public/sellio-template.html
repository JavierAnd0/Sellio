<style>
:root {
  --coral: #E8341A;
  --coral-dim: #C42A12;
  --black: #0A0A0A;
  --white: #F5F0EB;
  --gray: #6B6560;
  --border: rgba(255,255,255,0.08);
  --surface: #131110;
  --surface2: #1A1714;
  --bg: #0A0A0A;
  --fg: #F5F0EB;
}
@media (prefers-color-scheme: light) {
  :root {
    --border: rgba(0,0,0,0.08);
    --surface: #F0EBE4;
    --surface2: #E8E0D6;
    --bg: #F5F0EB;
    --fg: #0A0A0A;
    --gray: #7A6E66;
  }
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--fg);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* Animations */
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-12px) rotate(-4deg); }
}
@keyframes floatB {
  0%,100% { transform: translateY(0) rotate(3deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to { opacity:1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.fade-up { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.35s; }
.delay-4 { animation-delay: 0.5s; }

/* Tweaks */
.tweaks-panel {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; width: 240px; z-index: 500;
  display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.tweaks-panel.visible { display: block; }
.tweaks-title { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--gray); text-transform: uppercase; margin-bottom: 14px; }
.tweak-label { font-size: 11px; color: var(--fg); margin-bottom: 8px; font-weight: 500; }
.tweak-row { margin-bottom: 14px; }
.tweak-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-btn {
  padding: 5px 11px; border-radius: 6px; border: 1.5px solid var(--border);
  font-size: 11px; cursor: pointer; background: transparent; font-family: 'Space Grotesk', sans-serif;
  font-weight: 500; color: var(--fg); transition: all 0.15s;
}
.tweak-btn.active { background: var(--coral); color: #fff; border-color: var(--coral); }
</style>
</head>
<body>
<div id="root"></div>
<div class="tweaks-panel" id="tweaksPanel">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweak-row">
    <div class="tweak-label">Color acento</div>
    <div class="tweak-opts">
      <button class="tweak-btn active" onclick="setAccent('#E8341A','#C42A12',this)">Coral</button>
      <button class="tweak-btn" onclick="setAccent('#5B3FE8','#4530C2',this)">Índigo</button>
      <button class="tweak-btn" onclick="setAccent('#1A8C5B','#127040',this)">Verde</button>
    </div>
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Headline hero</div>
    <div class="tweak-opts">
      <button class="tweak-btn active" onclick="setHeadline(0,this)">ES</button>
      <button class="tweak-btn" onclick="setHeadline(1,this)">EN</button>
    </div>
  </div>
</div>
<script>
function setAccent(c, dim, btn) {
  document.documentElement.style.setProperty('--coral', c);
  document.documentElement.style.setProperty('--coral-dim', dim);
  document.querySelectorAll('.tweak-opts')[0].querySelectorAll('.tweak-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function setHeadline(idx, btn) {
  const headlines = ['Fideliza a tus clientes.', 'Keep them coming back.'];
  const sub = ['Crea tarjetas de lealtad digitales en minutos — sin código, sin complicaciones.', 'Create digital loyalty cards in minutes — no code, no complexity.'];
  document.getElementById('hero-headline').textContent = headlines[idx];
  document.getElementById('hero-sub').textContent = sub[idx];
  document.querySelectorAll('.tweak-opts')[1].querySelectorAll('.tweak-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaksPanel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaksPanel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  coral: 'var(--coral)', black: 'var(--black)', white: 'var(--white)',
  gray: 'var(--gray)', bg: 'var(--bg)', fg: 'var(--fg)',
  surface: 'var(--surface)', surface2: 'var(--surface2)', border: 'var(--border)',
};

// ── Mini loyalty card ─────────────────────────────────────────
function MiniCard({ name, business, points, rotate = 0, accent = '#E8341A', style = {} }) {
  return (
    <div style={{
      width: 300, background: `linear-gradient(135deg, #0F0C08 0%, #2A1A0E 60%, ${accent} 100%)`,
      borderRadius: 18, padding: '22px 24px', boxShadow: '0 32px 80px rgba(0,0,0,0.5)',
      transform: `rotate(${rotate}deg)`, position: 'relative', overflow: 'hidden', ...style,
    }}>
      <div style={{ position:'absolute', right:-30, top:-30, width:140, height:140, borderRadius:'50%', border:`1px solid ${accent}30` }}/>

          <span style={{ fontFamily:'Syne', fontWeight:800, fontSize:16, color:'var(--fg)' }}>Selio<span style={{color:'var(--coral)'}}>.</span></span>
        </div>
        <div style={{ display:'flex', gap:32 }}>
          {['Producto','Precios','API','Blog','Términos','Privacidad'].map(l => (

}
