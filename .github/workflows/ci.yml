name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # necesario para --filter=[origin/main]

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate environment stubs
        run: pnpm env:check
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-for-ci
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key-for-ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_CARDS_URL: http://localhost:3001
          QR_SIGNING_SECRET: stub-qr-secret-for-ci
          WOMPI_PUBLIC_KEY: pub_test_stub
          WOMPI_PRIVATE_KEY: prv_test_stub
          WOMPI_EVENTS_SECRET: stub-events-secret
          WOMPI_INTEGRITY_SECRET: stub-integrity-secret
          RESEND_API_KEY: re_stub
          SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0

      - name: Lint, typecheck, test & build
        run: pnpm turbo run lint typecheck test build --filter=[origin/main]
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-for-ci
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key-for-ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_CARDS_URL: http://localhost:3001
          QR_SIGNING_SECRET: stub-qr-secret-for-ci
          WOMPI_PUBLIC_KEY: pub_test_stub
          WOMPI_PRIVATE_KEY: prv_test_stub
          WOMPI_EVENTS_SECRET: stub-events-secret
          WOMPI_INTEGRITY_SECRET: stub-integrity-secret
          RESEND_API_KEY: re_stub
          SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
